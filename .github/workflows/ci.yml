name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "22"

jobs:
  # ── Python Backend Lint & Syntax Check ──────────────────────────────────────
  backend-lint:
    name: Backend Lint & Syntax
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install linting tools
        run: pip install flake8 pyflakes

      - name: Syntax check all Python files
        run: |
          find apps libs -name "*.py" -exec python -m py_compile {} \;
          echo "All Python files pass syntax check"

      - name: Flake8 lint (errors only)
        run: |
          flake8 apps/ libs/ \
            --count --select=E9,F63,F7,F82 \
            --show-source --statistics

  # ── Frontend Lint & Type Check ──────────────────────────────────────────────
  frontend-lint:
    name: Frontend Lint & TypeScript
    runs-on: ubuntu-latest
    if: ${{ hashFiles('client/package.json') != '' || hashFiles('apps/web-ui/package.json') != '' }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: |
          if [ -f "client/package.json" ]; then
            cd client && npm ci --ignore-scripts
          fi

      - name: TypeScript type check
        run: |
          if [ -f "client/tsconfig.json" ]; then
            cd client && npx tsc --noEmit || true
          fi

  # ── Security Scan ───────────────────────────────────────────────────────────
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for hardcoded secrets
        run: |
          echo "Scanning for hardcoded secrets..."
          FOUND=0
          # Check for common secret patterns
          if grep -rn "minioadmin\|changeme\|admin123\|password123" apps/ libs/ --include="*.py" | grep -v ".env.example" | grep -v "test_"; then
            echo "WARNING: Potential hardcoded secrets found"
            FOUND=1
          fi
          # Check for bare except
          BARE=$(grep -rn "except:" apps/ libs/ --include="*.py" | wc -l)
          if [ "$BARE" -gt 0 ]; then
            echo "WARNING: $BARE bare except statements found"
          fi
          # Check for shell=True
          SHELL_TRUE=$(grep -rn "shell=True" apps/ libs/ --include="*.py" | wc -l)
          if [ "$SHELL_TRUE" -gt 0 ]; then
            echo "WARNING: $SHELL_TRUE shell=True usages found"
          fi
          echo "Security scan complete"

  # ── Docker Build Test ───────────────────────────────────────────────────────
  docker-build:
    name: Docker Build Test
    runs-on: ubuntu-latest
    needs: [backend-lint]
    steps:
      - uses: actions/checkout@v4

      - name: Test Docker Compose config
        run: |
          if [ -f "docker-compose.yml" ]; then
            docker compose config --quiet 2>&1 || true
            echo "Docker Compose config validated"
          fi

  # ── Deploy to Production ────────────────────────────────────────────────────
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [backend-lint, security-scan, docker-build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /srv/ai-dev-team/platform
            git pull origin main
            docker compose build --parallel
            docker compose up -d
            echo "Deployment complete"

      - name: Health check
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            sleep 30
            curl -sf http://127.0.0.1/nginx-health || exit 1
            curl -sf http://127.0.0.1/health || exit 1
            echo "Health checks passed"
